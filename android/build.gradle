// Module-level build.gradle for react-native-litert-lm
// Configures Android build with Kotlin HybridObject + C++ JNI glue

plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
}

// Apply Nitrogen autolinking
apply from: '../nitrogen/generated/android/LiteRTLM+autolinking.gradle'

// Read LiteRT-LM SDK version from package.json (single source of truth)
def packageJson = new groovy.json.JsonSlurper().parseText(file('../package.json').text)
def litertLmVersion = packageJson.litertLm.androidMavenVersion

android {
    namespace "dev.litert.litertlm"
    compileSdk 36
    
    defaultConfig {
        minSdk 26  // LiteRT-LM requires API 26+
        
        externalNativeBuild {
            cmake {
                cppFlags "-O2 -fexceptions -frtti -std=c++20"
                arguments "-DANDROID_STL=c++_shared"
            }
        }
        
        ndk {
            abiFilters 'arm64-v8a'
        }
    }
    
    buildFeatures {
        prefab true
    }
    
    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
            version "3.22.1"
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
        // LiteRT-LM Android Maven (litertlm-android:0.10.2+) is published with
        // Kotlin metadata 2.3.0. Most React Native toolchains pin Kotlin 2.0.x
        // / 2.1.x, which can only read up to metadata 2.2. Skipping the check
        // is safe here because the JVM bytecode level is unchanged — only the
        // Kotlin metadata header version differs.
        freeCompilerArgs += '-Xskip-metadata-version-check'
    }
    
    sourceSets {
        main {
            java.srcDirs += [
                'src/main/java',
                '../nitrogen/generated/android/kotlin'
            ]
        }
    }
    
    packaging {
        jniLibs {
            keepDebugSymbols.add("**/*.so")
            // Exclude .so files we link against but don't own. These come
            // from other AARs (NitroModules, ReactNative, fbjni, jsi, libc++)
            // via Prefab IMPORTED targets. If we re-publish them in our AAR,
            // app:mergeDebugNativeLibs fails with DuplicateRelativeFileException
            // when both AARs contribute the same .so path.
            excludes.add("**/libNitroModules.so")
            excludes.add("**/libreactnative.so")
            excludes.add("**/libjsi.so")
            excludes.add("**/libfbjni.so")
            excludes.add("**/libc++_shared.so")
        }
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    // React Native
    implementation 'com.facebook.react:react-android'
    
    // Nitro Modules
    implementation project(':react-native-nitro-modules')
    
    // fbjni for HybridObject JNI bridge
    implementation 'com.facebook.fbjni:fbjni:0.6.0'
    
    // Kotlin coroutines for async operations
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-core:1.7.3'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
    
    // LiteRT-LM Kotlin API
    implementation "com.google.ai.edge.litertlm:litertlm-android:${litertLmVersion}"
}
